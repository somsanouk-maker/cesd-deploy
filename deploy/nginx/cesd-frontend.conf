# /etc/nginx/sites-available/cesd-frontend.conf
# Reverse proxy for the Next.js frontend (Phase 1 setup — HTTP only).
# `sudo certbot --nginx` rewrites this to add the HTTPS server block and
# port-80-to-443 redirect; do not hand-write the SSL block yourself.

server {
    listen 80;
    listen [::]:80;
    server_name cesd.fe-nuol.edu.la;

    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
