# /etc/nginx/sites-available/cesd-backend.conf
# Reverse proxy for the Laravel API + Filament admin (Phase 1 setup — HTTP
# only). `sudo certbot --nginx` rewrites this to add the HTTPS server block
# and port-80-to-443 redirect; do not hand-write the SSL block yourself.

server {
    listen 80;
    listen [::]:80;
    server_name api.cesd.fe-nuol.edu.la;

    # Equipment manual PDFs and news cover photos uploaded through Filament.
    client_max_body_size 20m;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
